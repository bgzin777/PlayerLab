<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM - PlayerLab</title>

<style>

body{
font-family:Arial;
background:#0f0f13;
color:white;
margin:0;
}

header{
background:#1f1f2e;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
color:#facc15;
}

.container{
padding:20px;
}

.card{
background:#1f1f2e;
padding:15px;
margin:10px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.ver{
background:#22c55e;
color:white;
}

.banir{
background:#ef4444;
color:white;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
background:#1f1f2e;
padding:15px;
border-radius:10px;
width:150px;
text-align:center;
}

</style>
</head>

<body>

<header>

<h1>Painel ADM</h1>

<button onclick="logout()">Sair</button>

</header>

<div class="container">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="box">
<p>Usuários</p>
<h2 id="totalUsers">0</h2>
</div>

<div class="box">
<p>Jogadores</p>
<h2 id="totalPlayers">0</h2>
</div>

<div class="box">
<p>Clubes</p>
<h2 id="totalClubs">0</h2>
</div>

<div class="box">
<p>Banidos</p>
<h2 id="totalBans">0</h2>
</div>

</div>

<h2>Usuários</h2>
<div id="usuarios"></div>

<h2>Jogadores</h2>
<div id="jogadores"></div>

<h2>Clubes</h2>
<div id="clubes"></div>

</div>

<script>

// proteção ADM
if(localStorage.getItem("admLogado") !== "true"){
window.location.href="index.html"
}

function logout(){
localStorage.removeItem("admLogado")
window.location.href="index.html"
}

function carregarPainel(){

let usuariosDiv=document.getElementById("usuarios")
let jogadoresDiv=document.getElementById("jogadores")
let clubesDiv=document.getElementById("clubes")

usuariosDiv.innerHTML=""
jogadoresDiv.innerHTML=""
clubesDiv.innerHTML=""

let totalUsers=0
let totalPlayers=0
let totalClubs=0
let totalBans=0

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i)

if(key.startsWith("user_")){

let nome=key.replace("user_","")

totalUsers++

if(localStorage.getItem("ban_"+nome)) totalBans++

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<span>${nome}</span>

<div>
<button class="banir" onclick="banir('${nome}')">Banir</button>
</div>
`

usuariosDiv.appendChild(card)

}

if(key.startsWith("player_")){

let nome=key.replace("player_","")

totalPlayers++

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<span>${nome}</span>

<div>
<button class="ver" onclick="verJogador('${nome}')">Ver</button>
<button class="banir" onclick="banir('${nome}')">Banir</button>
</div>
`

jogadoresDiv.appendChild(card)

}

if(key.startsWith("clube_")){

let nome=key.replace("clube_","")

totalClubs++

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<span>${nome}</span>

<div>
<button class="ver" onclick="verClube('${nome}')">Ver</button>
<button class="banir" onclick="banir('${nome}')">Banir</button>
</div>
`

clubesDiv.appendChild(card)

}

}

document.getElementById("totalUsers").innerText=totalUsers
document.getElementById("totalPlayers").innerText=totalPlayers
document.getElementById("totalClubs").innerText=totalClubs
document.getElementById("totalBans").innerText=totalBans

}

function banir(nome){

localStorage.setItem("ban_"+nome,"true")

alert(nome+" foi banido")

carregarPainel()

}

function verJogador(nome){

window.location.href="perfiljogador.html?nome="+nome

}

function verClube(nome){

window.location.href="perfilclube.html?nome="+nome

}

carregarPainel()

</script>

</body>
</html>
