<!DOCTYPE html>
<html>
<head>
<title>Configurações</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>Configurações</h2>

<button onclick="sair()">Sair da conta</button>

<button onclick="apagar()">Apagar dados</button>

<script>

function sair(){

localStorage.removeItem("usuarioLogado")

alert("Você saiu da conta")

window.location="index.html"

}

function apagar(){

localStorage.clear()

alert("Todos os dados apagados")

location.reload()

}

</script>

</body>
</html>
