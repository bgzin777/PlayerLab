<!DOCTYPE html>
<html>
<head>
<title>Pesquisar Talentos</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>Pesquisar Jogadores</h2>

<input id="nome" placeholder="Nome do jogador">

<button onclick="salvar()">Salvar talento</button>

<script>

function salvar(){

let nome=document.getElementById("nome").value

let talentos=JSON.parse(localStorage.getItem("talentos")||"[]")

talentos.push(nome)

localStorage.setItem("talentos",JSON.stringify(talentos))

alert("Talento salvo")

}

</script>

</body>
</html>
