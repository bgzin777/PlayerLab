<!DOCTYPE html>
<html>
<head>
<title>Análises</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>Analisar Jogador</h2>

<input id="nome" placeholder="Nome jogador">
<input id="nota" placeholder="Nota">

<button onclick="salvar()">Salvar análise</button>

<div id="lista"></div>

<script>

function salvar(){

let nome=document.getElementById("nome").value
let nota=document.getElementById("nota").value

let dados=JSON.parse(localStorage.getItem("analises")||"[]")

dados.push(nome+" - Nota: "+nota)

localStorage.setItem("analises",JSON.stringify(dados))

mostrar()

}

function mostrar(){

let dados=JSON.parse(localStorage.getItem("analises")||"[]")

let lista=document.getElementById("lista")

lista.innerHTML=""

dados.forEach(d=>{

let div=document.createElement("div")

div.innerHTML=d

lista.appendChild(div)

})

}

mostrar()

</script>

</body>
</html>
