<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listagem de Pesquisas - PlayerLab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0f0f13;color:white;display:flex;justify-content:center;padding:20px;}
.container{background:linear-gradient(145deg,#4f46e5,#6366f1);padding:40px 30px;border-radius:25px;max-width:900px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,0.6);position:relative;}
h1{font-size:2.5rem;margin-bottom:20px;text-align:center;}
h1 span{color:#facc15;text-shadow:0 0 10px rgba(0,0,0,0.4);}
.btn-voltar{position:absolute;top:20px;left:20px;padding:10px 15px;background:#facc15;color:#1a1a2e;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all 0.3s;}
.btn-voltar:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.4);}
.list-container{margin-top:30px;display:flex;flex-direction:column;gap:15px;max-height:70vh;overflow-y:auto;}
.list-item{background:#1a1a2e;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.list-item h2{font-size:1.3rem;margin-bottom:5px;color:#facc15;}
.list-item p{font-size:1rem;color:#d1d5db;}
.clear-btn{margin-top:20px;padding:12px 20px;border:none;border-radius:12px;background:#e11d48;color:white;font-weight:600;cursor:pointer;transition:all 0.3s;}
.clear-btn:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.4);}
</style>
</head>
<body>

<div class="container">
<button class="btn-voltar" onclick="window.location.href='clube.html'">VOLTAR</button>
<h1>Listagem de <span>Pesquisas</span></h1>

<div class="list-container" id="listContainer">
<!-- Listagem aparecerá aqui -->
</div>

<button class="clear-btn" onclick="limparListagem()">Limpar Listagem</button>

<script>
// Carregar listagem
function carregarListagem(){
    const container = document.getElementById('listContainer');
    container.innerHTML = '';
    let encontrou = false;
    for(let i=0;i<localStorage.length;i++){
        const key = localStorage.key(i);
        if(key.startsWith('pesquisa_')){
            encontrou = true;
            const pesquisa = localStorage.getItem(key);
            const div = document.createElement('div');
            div.className='list-item';
            div.innerHTML=`<h2>${pesquisa}</h2><p>Data/Hora: ${new Date(parseInt(key.split('_')[1])).toLocaleString()}</p>`;
            container.appendChild(div);
        }
    }
    if(!encontrou){
        container.innerHTML='<p style="text-align:center;color:#d1d5db;">Nenhuma pesquisa encontrada.</p>';
    }
}

// Limpar listagem
function limparListagem(){
    if(confirm("Deseja realmente limpar toda a listagem de pesquisas?")){
        const keys = [];
        for(let i=0;i<localStorage.length;i++){
            const key = localStorage.key(i);
            if(key.startsWith('pesquisa_')){
                keys.push(key);
            }
        }
        keys.forEach(k=>localStorage.removeItem(k));
        carregarListagem();
    }
}

// Inicializa
carregarListagem();
</script>

</div>
</body>
</html>
