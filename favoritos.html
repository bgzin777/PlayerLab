<!DOCTYPE html>
<html>
<head>
<title>Favoritos</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>Jogadores Favoritos</h2>

<input id="fav" placeholder="Nome jogador">

<button onclick="salvar()">Salvar favorito</button>

<div id="lista"></div>

<script>

function salvar(){

let nome=document.getElementById("fav").value

let fav=JSON.parse(localStorage.getItem("favoritos")||"[]")

fav.push(nome)

localStorage.setItem("favoritos",JSON.stringify(fav))

mostrar()

}

function mostrar(){

let fav=JSON.parse(localStorage.getItem("favoritos")||"[]")

let lista=document.getElementById("lista")

lista.innerHTML=""

fav.forEach(f=>{

let div=document.createElement("div")

div.innerHTML=f

lista.appendChild(div)

})

}

mostrar()

</script>

</body>
</html>
