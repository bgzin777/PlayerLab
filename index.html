<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Sistema de Treino de Futebol</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>⚽ Sistema de Treino de Futebol</h1>
</header>

<div class="container">

<!-- Cadastro do jogador -->

<div class="card">

<h2>Cadastro do Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<br><br>

<input type="number" id="altura" placeholder="Altura (cm)">

<br><br>

<input type="number" id="peso" placeholder="Peso (kg)">

<br><br>

<select id="posicao">

<option>Goleiro</option>
<option>Zagueiro</option>
<option>Meio Campo</option>
<option>Atacante</option>

</select>

<br><br>

<button onclick="salvarPerfil()">Salvar Perfil</button>

<p id="perfil"></p>

</div>


<!-- Registrar treino -->

<div class="card">

<h2>Registrar Treino</h2>

<input type="text" id="tipoTreino" placeholder="Tipo de treino">

<br><br>

<input type="number" id="tempoTreino" placeholder="Tempo do treino (min)">

<br><br>

<input type="number" id="resultado" placeholder="Resultado">

<br><br>

<button onclick="salvarTreino()">Salvar Treino</button>

</div>


<!-- Estatísticas -->

<div class="card">

<h2>Estatísticas</h2>

<p>Total de treinos: <span id="totalTreinos">0</span></p>

</div>


<!-- Gráfico -->

<div class="card">

<h2>📈 Evolução Semanal</h2>

<canvas id="graficoTreino"></canvas>

<br><br>

<button onclick="apagarSemana()">Apagar treinos da semana</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
