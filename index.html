<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login e Registro Local</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0f172a, #1e293b);
  color: #f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container {
  background: rgba(30,41,59,0.9);
  padding:30px;
  border-radius:12px;
  width: 350px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  text-align:center;
}
h2 { margin-bottom:20px; }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none; font-size:16px; }
button { width:100%; padding:10px; margin:10px 0; border:none; border-radius:6px; background:#22c55e; color:white; font-weight:bold; cursor:pointer; }
button:hover { background:#16a34a; }
#error { color:#f87171; margin:10px 0; }
#sucesso { color:#22c55e; margin:10px 0; }
.tabs { display:flex; justify-content:space-around; margin-bottom:20px; }
.tab { cursor:pointer; padding:10px 20px; border-radius:6px; background:#1e293b; }
.tab.active { background:#22c55e; }
</style>
</head>
<body>

<div class="container">
  <div class="tabs">
    <div id="tabLogin" class="tab active">Login</div>
    <div id="tabRegistro" class="tab">Registrar</div>
  </div>

  <div id="formLogin">
    <input id="loginEmail" type="email" placeholder="E-mail">
    <input id="loginSenha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>

  <div id="formRegistro" style="display:none;">
    <input id="regEmail" type="email" placeholder="E-mail">
    <input id="regSenha" type="password" placeholder="Senha">
    <button onclick="registrar()">Registrar</button>
  </div>

  <div id="error"></div>
  <div id="sucesso"></div>
</div>

<script>
const tabLogin = document.getElementById("tabLogin");
const tabRegistro = document.getElementById("tabRegistro");
const formLogin = document.getElementById("formLogin");
const formRegistro = document.getElementById("formRegistro");
const error = document.getElementById("error");
const sucesso = document.getElementById("sucesso");

// Alternar abas
tabLogin.onclick = () => {
  formLogin.style.display = "block";
  formRegistro.style.display = "none";
  tabLogin.classList.add("active");
  tabRegistro.classList.remove("active");
  error.innerText = "";
  sucesso.innerText = "";
};
tabRegistro.onclick = () => {
  formLogin.style.display = "none";
  formRegistro.style.display = "block";
  tabRegistro.classList.add("active");
  tabLogin.classList.remove("active");
  error.innerText = "";
  sucesso.innerText = "";
};

// Registrar usuário
function registrar() {
  const email = document.getElementById("regEmail").value.trim();
  const senha = document.getElementById("regSenha").value.trim();
  if(!email || !senha) { error.innerText = "Preencha todos os campos!"; return; }

  let users = JSON.parse(localStorage.getItem("users") || "{}");
  if(users[email]) { error.innerText = "E-mail já registrado!"; return; }

  users[email] = senha;
  localStorage.setItem("users", JSON.stringify(users));
  sucesso.innerText = "Conta registrada com sucesso!";
  error.innerText = "";
  document.getElementById("regEmail").value = "";
  document.getElementById("regSenha").value = "";
}

// Login usuário
function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const senha = document.getElementById("loginSenha").value.trim();
  if(!email || !senha) { error.innerText = "Preencha todos os campos!"; return; }

  let users = JSON.parse(localStorage.getItem("users") || "{}");
  if(!users[email]) { error.innerText = "Conta não existe!"; return; }
  if(users[email] !== senha) { error.innerText = "Senha incorreta!"; return; }

  sucesso.innerText = `Login realizado com sucesso! Bem-vindo ${email}`;
  error.innerText = "";
  document.getElementById("loginEmail").value = "";
  document.getElementById("loginSenha").value = "";
}
</script>

</body>
</html>
