<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayerLab - Perfil do Jogador</title>
<style>
body{
    font-family:'Inter',sans-serif;
    background:#0f0f13;
    color:white;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    background:#1a1a24;
    padding:30px;
    border-radius:20px;
    width:550px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{
    color:#facc15;
    margin-bottom:20px;
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:600;
}

input[type="text"], textarea, select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2a2a36;
    color:white;
    font-size:1rem;
}

textarea{
    resize:none;
    height:100px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#8b5cf6,#facc15);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    color:white;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.foto-preview, .video-preview{
    margin-top:15px;
    text-align:center;
}
.foto-preview img, .video-preview video{
    width:150px;
    height:150px;
    border-radius:10px;
    object-fit:cover;
    border:3px solid #facc15;
    margin-bottom:10px;
}

.secao-treino{
    margin-top:25px;
}

.secao-treino h2{
    color:#facc15;
    margin-bottom:15px;
    font-size:1.3rem;
    text-align:center;
}

.posicoes button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    background:#6366f1;
    cursor:pointer;
    color:white;
    transition:0.3s;
}
.posicoes button:hover{
    transform:scale(1.05);
}
.posicoes button.selecionado{
    background:#facc15;
    color:#000;
}

/* Rank */
.rank{
    margin-top:15px;
    padding:12px;
    background:#2a2a36;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    font-size:1.2rem;
}
</style>
</head>
<body>

<div class="container">
    <h1>Perfil do Jogador</h1>

    <label for="nome">Nome / Apelido:</label>
    <input type="text" id="nome" placeholder="Digite seu nome ou apelido">

    <label for="descricao">Descrição:</label>
    <textarea id="descricao" placeholder="Fale sobre você, suas habilidades, estilo de jogo..."></textarea>

    <label for="foto">Foto de Perfil:</label>
    <input type="file" id="foto" accept="image/*">
    <div class="foto-preview" id="fotoPreview"></div>

    <label for="video">Vídeo de Destaque:</label>
    <input type="file" id="video" accept="video/*">
    <div class="video-preview" id="videoPreview"></div>

    <!-- Posições -->
    <div class="secao-treino">
        <h2>Escolha sua Posição</h2>
        <div class="posicoes">
            <button onclick="selecionarPosicao(this)">Goleiro</button>
            <button onclick="selecionarPosicao(this)">Zagueiro</button>
            <button onclick="selecionarPosicao(this)">Lateral</button>
            <button onclick="selecionarPosicao(this)">Volante</button>
            <button onclick="selecionarPosicao(this)">Meio-Campo</button>
            <button onclick="selecionarPosicao(this)">Atacante</button>
            <button onclick="selecionarPosicao(this)">Ponta</button>
        </div>
    </div>

    <!-- Habilidades -->
    <div class="secao-treino">
        <h2>Habilidades</h2>
        <label for="velocidade">Velocidade (0-100)</label>
        <input type="text" id="velocidade" placeholder="Ex: 85">
        <label for="chute">Chute (0-100)</label>
        <input type="text" id="chute" placeholder="Ex: 90">
        <label for="drible">Drible (0-100)</label>
        <input type="text" id="drible" placeholder="Ex: 80">
        <label for="defesa">Defesa (0-100)</label>
        <input type="text" id="defesa" placeholder="Ex: 70">
    </div>

    <!-- Rank -->
    <div class="rank" id="rank">Rank: Nível 1</div>

    <button id="salvarBtn" onclick="salvarPerfil()">Salvar Perfil</button>
</div>

<script>
let posicaoSelecionada = "";
const usuarioLogado = localStorage.getItem("usuarioLogado");

// Carregar perfil existente
window.onload = function(){
    if(!usuarioLogado) return;
    const dados = JSON.parse(localStorage.getItem("perfil_" + usuarioLogado));
    if(dados){
        document.getElementById("nome").value = dados.nome || "";
        document.getElementById("descricao").value = dados.descricao || "";
        if(dados.foto) mostrarFoto(dados.foto);
        if(dados.video) mostrarVideo(dados.video);
        posicaoSelecionada = dados.posicao || "";
        document.querySelectorAll(".posicoes button").forEach(b => {
            if(b.textContent === posicaoSelecionada) b.classList.add("selecionado");
        });
        document.getElementById("velocidade").value = dados.velocidade || "";
        document.getElementById("chute").value = dados.chute || "";
        document.getElementById("drible").value = dados.drible || "";
        document.getElementById("defesa").value = dados.defesa || "";
    }
    atualizarRank();
}

// Salvar perfil
function salvarPerfil(){
    if(!usuarioLogado) return alert("Nenhum usuário logado!");
    const perfil = {
        nome: document.getElementById("nome").value,
        descricao: document.getElementById("descricao").value,
        foto: localStorage.getItem("fotoTemp") || "",
        video: localStorage.getItem("videoTemp") || "",
        posicao: posicaoSelecionada,
        velocidade: document.getElementById("velocidade").value,
        chute: document.getElementById("chute").value,
        drible: document.getElementById("drible").value,
        defesa: document.getElementById("defesa").value
    };
    localStorage.setItem("perfil_" + usuarioLogado, JSON.stringify(perfil));
    alert("Perfil salvo com sucesso!");
    atualizarRank();
}

// Posições
function selecionarPosicao(botao){
    document.querySelectorAll(".posicoes button").forEach(b => b.classList.remove("selecionado"));
    botao.classList.add("selecionado");
    posicaoSelecionada = botao.textContent;
}

// Preview da foto
document.getElementById("foto").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(){ localStorage.setItem("fotoTemp", reader.result); mostrarFoto(reader.result); }
        reader.readAsDataURL(file);
    }
});
function mostrarFoto(src){ document.getElementById("fotoPreview").innerHTML = `<img src="${src}" alt="Foto do Jogador">`; }

// Preview do vídeo
document.getElementById("video").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(){ localStorage.setItem("videoTemp", reader.result); mostrarVideo(reader.result); }
        reader.readAsDataURL(file);
    }
});
function mostrarVideo(src){ document.getElementById("videoPreview").innerHTML = `<video src="${src}" controls></video>`; }

// Rank automático baseado nas habilidades
function atualizarRank(){
    const v = parseInt(document.getElementById("velocidade").value)||0;
    const c = parseInt(document.getElementById("chute").value)||0;
    const d = parseInt(document.getElementById("drible").value)||0;
    const def = parseInt(document.getElementById("defesa").value)||0;
    const media = Math.round((v+c+d+def)/4);
    let nivel="";
    if(media>=90) nivel="Elite";
    else if(media>=75) nivel="Pro";
    else if(media>=50) nivel="Intermediário";
    else nivel="Iniciante";
    document.getElementById("rank").innerText = `Rank: ${nivel} (${media})`;
}
</script>

</body>
</html>
