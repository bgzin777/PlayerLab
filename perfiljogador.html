<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayerLab - Perfil do Jogador</title>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f0f13;
    color: white;
    display: flex;
    justify-content: center;
    padding: 30px;
}
.container {
    background: #1a1a24;
    padding: 30px;
    border-radius: 20px;
    width: 700px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
h1 {
    color: #facc15;
    text-align: center;
    margin-bottom: 20px;
}
.section {
    margin-top: 20px;
}
.profile-info {
    display: flex;
    gap: 20px;
}
.profile-info img {
    width: 150px;
    height: 150px;
    border-radius: 12px;
    object-fit: cover;
}
.profile-data {
    flex: 1;
}
.profile-data h2 {
    margin-bottom: 10px;
}
.profile-data p {
    margin-bottom: 8px;
}
button {
    padding: 10px 15px;
    margin: 5px 5px 5px 0;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#8b5cf6,#facc15);
    cursor: pointer;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
}
.video-section video {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
.rank {
    font-weight: bold;
    color: #facc15;
    margin-bottom: 10px;
}
.stats {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}
.stat-item {
    background: #2a2a36;
    padding: 10px;
    border-radius: 8px;
    flex: 1 1 100px;
    text-align: center;
}
.interactions {
    margin-top: 20px;
}
.back-button {
    background: #e11d48;
    margin-top: 20px;
}
.back-button:hover {
    background: #be123c;
}
</style>
</head>
<body>
<div class="container">
<h1>Perfil do Jogador</h1>

<div class="profile-info">
    <img id="fotoPerfil" src="https://via.placeholder.com/150" alt="Foto do Jogador">
    <div class="profile-data">
        <h2 id="nomeJogador">Nome do Jogador</h2>
        <p id="apelidoJogador"><strong>Apelido:</strong> -</p>
        <p id="descricaoJogador"><strong>Descrição:</strong> -</p>
        <p id="posicaoJogador"><strong>Posição:</strong> -</p>
        <p class="rank" id="rankJogador"><strong>Rank:</strong> -</p>
    </div>
</div>

<div class="section stats">
    <div class="stat-item">Velocidade: <span id="velocidade">-</span></div>
    <div class="stat-item">Chute: <span id="chute">-</span></div>
    <div class="stat-item">Passe: <span id="passe">-</span></div>
    <div class="stat-item">Drible: <span id="drible">-</span></div>
    <div class="stat-item">Defesa: <span id="defesa">-</span></div>
</div>

<div class="section video-section">
    <h3>Vídeos</h3>
    <div id="videosJogador">
        <p>Nenhum vídeo disponível.</p>
    </div>
</div>

<div class="interactions">
    <button onclick="adicionarFavorito()">Adicionar aos Favoritos</button>
    <button onclick="bloquearJogador()">Bloquear Jogador</button>
    <button onclick="salvarTalento()">Salvar como Talento</button>
    <button onclick="marcarAnalise()">Marcar para Análise</button>
</div>

<button class="back-button" onclick="voltar()">Voltar ao Clube</button>

<script>
const nomeSelecionado = localStorage.getItem("perfilSelecionado");
const usuarioLogado = localStorage.getItem("usuarioLogado");
if(!nomeSelecionado){
    alert("Nenhum jogador selecionado.");
    window.location.href="clube.html";
}

const perfil = JSON.parse(localStorage.getItem("perfil_" + nomeSelecionado));

if(perfil){
    document.getElementById("nomeJogador").innerText = perfil.nome || nomeSelecionado;
    document.getElementById("apelidoJogador").innerHTML = "<strong>Apelido:</strong> " + (perfil.apelido || "-");
    document.getElementById("descricaoJogador").innerHTML = "<strong>Descrição:</strong> " + (perfil.descricao || "-");
    document.getElementById("posicaoJogador").innerHTML = "<strong>Posição:</strong> " + (perfil.posicao || "-");
    document.getElementById("rankJogador").innerHTML = "<strong>Rank:</strong> " + (perfil.rank || "-");
    document.getElementById("fotoPerfil").src = perfil.foto || "https://via.placeholder.com/150";

    document.getElementById("velocidade").innerText = perfil.velocidade || "-";
    document.getElementById("chute").innerText = perfil.chute || "-";
    document.getElementById("passe").innerText = perfil.passe || "-";
    document.getElementById("drible").innerText = perfil.drible || "-";
    document.getElementById("defesa").innerText = perfil.defesa || "-";

    const videosDiv = document.getElementById("videosJogador");
    videosDiv.innerHTML = "";
    if(perfil.videos && perfil.videos.length > 0){
        perfil.videos.forEach(v=>{
            const video = document.createElement("video");
            video.src=v;
            video.controls=true;
            videosDiv.appendChild(video);
        });
    } else {
        videosDiv.innerHTML = "<p>Nenhum vídeo disponível.</p>";
    }
}

// Funções de interação
function adicionarFavorito(){
    let favoritos = JSON.parse(localStorage.getItem("favoritos_" + usuarioLogado)) || [];
    if(!favoritos.includes(nomeSelecionado)){
        favoritos.push(nomeSelecionado);
        localStorage.setItem("favoritos_" + usuarioLogado, JSON.stringify(favoritos));
        alert("Jogador adicionado aos favoritos!");
    } else alert("Jogador já está nos favoritos!");
}

function bloquearJogador(){
    let bloqueados = JSON.parse(localStorage.getItem("bloqueados_" + usuarioLogado)) || [];
    if(!bloqueados.includes(nomeSelecionado)){
        bloqueados.push(nomeSelecionado);
        localStorage.setItem("bloqueados_" + usuarioLogado, JSON.stringify(bloqueados));
        alert("Jogador bloqueado!");
    } else alert("Jogador já está bloqueado!");
}

function salvarTalento(){
    let talentos = JSON.parse(localStorage.getItem("talentos_" + usuarioLogado)) || [];
    if(!talentos.includes(nomeSelecionado)){
        talentos.push(nomeSelecionado);
        localStorage.setItem("talentos_" + usuarioLogado, JSON.stringify(talentos));
        alert("Jogador salvo como talento!");
    } else alert("Jogador já é talento!");
}

function marcarAnalise(){
    let analise = JSON.parse(localStorage.getItem("analise_" + usuarioLogado)) || [];
    if(!analise.includes(nomeSelecionado)){
        analise.push(nomeSelecionado);
        localStorage.setItem("analise_" + usuarioLogado, JSON.stringify(analise));
        alert("Jogador marcado para análise!");
    } else alert("Jogador já está na análise!");
}

function voltar(){
    window.location.href="clube.html";
}
</script>
</body>
</html>
